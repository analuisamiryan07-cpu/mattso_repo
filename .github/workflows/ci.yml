name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — TypeCheck & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-matsso
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend-matsso/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (TypeScript compile + Nest)
        run: npm run build

  frontend:
    name: Frontend — Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (Vite)
        run: npm run build
        env:
          VITE_API_URL: https://tikky-hg4n.onrender.com/api
